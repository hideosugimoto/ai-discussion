<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7f5f2"/>
      <stop offset="1" stop-color="#eeebe6"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#c47b1a"/>
      <stop offset="0.5" stop-color="#285240"/>
      <stop offset="1" stop-color="#2e7db8"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0.2" cy="0.1" r="0.6">
      <stop offset="0" stop-color="#c47b1a" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#c47b1a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.85" cy="0.15" r="0.55">
      <stop offset="0" stop-color="#2e7db8" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#2e7db8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow3" cx="0.5" cy="0.95" r="0.6">
      <stop offset="0" stop-color="#285240" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#285240" stop-opacity="0"/>
    </radialGradient>
    <style>
      .h1 { font-family: 'Noto Sans JP','Hiragino Sans','Yu Gothic UI','DM Sans',sans-serif; font-weight: 700; }
      .h2 { font-family: 'DM Sans','Noto Sans JP',sans-serif; font-weight: 600; }
      .body { font-family: 'Noto Sans JP','Hiragino Sans',sans-serif; font-weight: 500; }
      .mono { font-family: 'SFMono-Regular','Menlo','Consolas',monospace; font-weight: 600; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>
  <rect width="1200" height="630" fill="url(#glow3)"/>

  <!-- Logo mark + brand -->
  <g transform="translate(80, 70)">
    <rect width="44" height="44" rx="12" fill="url(#brand)"/>
    <text x="60" y="30" class="h2" font-size="22" fill="#2a2520">3 AI Discussion</text>
  </g>

  <!-- Eyebrow badge -->
  <g transform="translate(80, 160)">
    <rect width="220" height="36" rx="18" fill="#eef6f1" stroke="#deeee6"/>
    <text x="110" y="23" class="body" font-size="13" fill="#285240" text-anchor="middle">AI 議論プラットフォーム</text>
  </g>

  <!-- Main headline -->
  <text x="80" y="270" class="h1" font-size="64" fill="#2a2520">1つの問いに、</text>
  <text x="80" y="346" class="h1" font-size="64" fill="url(#brand)">3つの最強AI。</text>

  <!-- Subhead -->
  <text x="80" y="408" class="body" font-size="22" fill="#5a524a">Claude · ChatGPT · Gemini が同じ議題を議論し、</text>
  <text x="80" y="442" class="body" font-size="22" fill="#5a524a">合意点・対立点・結論まで自動でまとめます。</text>

  <!-- Price callout -->
  <g transform="translate(80, 490)">
    <rect width="260" height="64" rx="14" fill="#285240"/>
    <text x="22" y="40" class="h2" font-size="14" fill="#deeee6">月額</text>
    <text x="62" y="44" class="h1" font-size="34" fill="#ffffff">¥980</text>
    <text x="180" y="44" class="body" font-size="13" fill="#deeee6">APIキー不要</text>
  </g>

  <!-- Comparison strikethrough -->
  <g transform="translate(370, 490)">
    <text x="0" y="28" class="body" font-size="13" fill="#766b60">通常 (3社契約)</text>
    <text x="0" y="56" class="h2" font-size="22" fill="#766b60" text-decoration="line-through">¥9,000 / 月</text>
  </g>

  <!-- 3 AI cards on the right -->
  <g transform="translate(720, 150)">
    <!-- Claude -->
    <g>
      <rect width="400" height="116" rx="14" fill="#ffffff" stroke="#e0dcd5"/>
      <circle cx="24" cy="28" r="6" fill="#c47b1a"/>
      <text x="40" y="34" class="h2" font-size="14" fill="#c47b1a">Claude</text>
      <text x="100" y="34" class="mono" font-size="11" fill="#766b60">opus 4.6</text>
      <text x="24" y="62" class="body" font-size="13" fill="#2a2520">あなたの価値観を踏まえると、起業</text>
      <text x="24" y="84" class="body" font-size="13" fill="#2a2520">の方が後悔しないと思う。長期の自</text>
      <text x="24" y="106" class="body" font-size="13" fill="#2a2520">由度を最重視している点が決め手。</text>
    </g>
    <!-- ChatGPT -->
    <g transform="translate(0, 130)">
      <rect width="400" height="116" rx="14" fill="#ffffff" stroke="#e0dcd5"/>
      <circle cx="24" cy="28" r="6" fill="#285240"/>
      <text x="40" y="34" class="h2" font-size="14" fill="#285240">ChatGPT</text>
      <text x="110" y="34" class="mono" font-size="11" fill="#766b60">gpt-4o</text>
      <text x="24" y="62" class="body" font-size="13" fill="#2a2520">いや、収入の安定性を軽視しすぎ</text>
      <text x="24" y="84" class="body" font-size="13" fill="#2a2520">だ。最低6ヶ月の生活防衛資金を確</text>
      <text x="24" y="106" class="body" font-size="13" fill="#2a2520">保した上で判断するべき。</text>
    </g>
    <!-- Gemini -->
    <g transform="translate(0, 260)">
      <rect width="400" height="116" rx="14" fill="#ffffff" stroke="#e0dcd5"/>
      <circle cx="24" cy="28" r="6" fill="#2e7db8"/>
      <text x="40" y="34" class="h2" font-size="14" fill="#2e7db8">Gemini</text>
      <text x="100" y="34" class="mono" font-size="11" fill="#766b60">2.5 pro</text>
      <text x="24" y="62" class="body" font-size="13" fill="#2a2520">2人とも前提を見落としている。家</text>
      <text x="24" y="84" class="body" font-size="13" fill="#2a2520">族の状況と健康保険の切替コスト</text>
      <text x="24" y="106" class="body" font-size="13" fill="#2a2520">を先に検討するべきです。</text>
    </g>
  </g>

  <!-- Bottom URL -->
  <text x="80" y="588" class="mono" font-size="14" fill="#766b60">ai-discussion.pages.dev</text>
</svg>
