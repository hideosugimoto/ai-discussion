name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Model display sync check
        # Fails if LP/README model names drift from src/models.config.js.
        # Fix locally with `npm run sync:models`.
        run: npm run sync:models:check

      - name: Test
        run: npm test
